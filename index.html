<!DOCTYPE html>
<html>
<head>
	<title>我的图床</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
			background-color: #f5f5f5;
		}
		#header {
			background-color: #f5f5f5;
			text-align: center;
			padding: 10px;
		}
		#header h1 {
			margin: 0;
			font-size: 32px;
			color: rgb(103, 188, 216);
		}
		#content {
			text-align: center;
			padding: 10px;
		}
		#content img {
			max-width: 100%;
			height: auto;
			cursor: pointer;
		}
		#content p {
			margin: 24px 0;
			font-size: 28px;
			color: #666;
		}
		#footer {
			background-color: #0077cc;
			color: #fff;
			text-align: center;
			padding: 20px;
			font-size: 12px;
			box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.3);
		}
	</style>
</head>
<body>
	<div id="header">
		<h1>我的图床</h1>
	</div>
	<div id="content">
		<p>欢迎查看</p>
	</div>
	<div id="footer">
		版权所有 &copy; 2023 枫
	</div>
</body>
</html>
